# @package _global_

# defaults:
#   - reward_base

algo:
    config:
        entropy_coef: 0.001
        init_noise_std: 0.5

env:
    config:
        termination_scales:
            termination_min_base_height: 0.40
        termination:
            terminate_by_low_height: True
rewards:
  set_reward: Sangyun Bae (reference h1 reward)
  set_reward_date: 20260710
  only_positive_rewards: False
  reward_scales:
      tracking_lin_vel: 2.0
      tracking_ang_vel: 1.0
      penalty_lin_vel_z: -1.0
      penalty_ang_vel_xy: -0.7
      penalty_orientation: 0 # og : -1.0
      penalty_torques: -0.00001
      penalty_dof_vel: -0.0001
      penalty_dof_acc: -3.5e-8
      penalty_action_rate: -0.01
      # penalty_feet_contact_forces: -0.01
      # penalty_stumble: -10.0
      penalty_slippage: -1.0
      penalty_feet_ori: -2.0
      limits_dof_pos: -5.0
      limits_dof_vel: -5.0
      limits_torque: -0.1
      feet_air_time: 1.0
      base_height: -5.0
      penalty_feet_height: -2.
      termination: -50.0
      # 팔(어깨~손목) 관절이 default pose에서 벗어나면 벌점 — 팔 발산 방지
      upperbody_joint_angle_freeze: -0.02
      # hip roll/yaw 벌점 — 다리 벌리고 버티는 자세 방지
      penalty_hip_pos: -1.0
      # 몸통(WL3) 직립 벌점 — 상체 앞으로 숙임 방지 (문제 1)
      penalty_torso_ori: -0.2
      # zero command 시 발 스테핑/발 XY 이동 벌점 (문제 2)
      penalty_stand_still: -1.0
      # penalty_in_the_air: -100.0
      # feet_max_height_for_this_air: -100.0




  reward_tracking_sigma:
    lin_vel: 0.25
    ang_vel: 0.25
  reward_limit:
    soft_dof_pos_limit: 0.91
    soft_dof_vel_limit: 0.9
    soft_torque_limit: 0.9

    reward_limits_curriculum:
      soft_dof_pos_curriculum: False
      soft_dof_pos_initial_limit: 1.15
      soft_dof_pos_max_limit: 1.15
      soft_dof_pos_min_limit: 0.95
      soft_dof_pos_curriculum_degree: 0.00000025
      soft_dof_pos_curriculum_level_down_threshold: 40
      soft_dof_pos_curriculum_level_up_threshold: 42

      soft_dof_vel_curriculum: False
      soft_dof_vel_initial_limit: 1.15
      soft_dof_vel_max_limit: 1.25
      soft_dof_vel_min_limit: 0.95
      soft_dof_vel_curriculum_degree: 0.00000025
      soft_dof_vel_curriculum_level_down_threshold: 40
      soft_dof_vel_curriculum_level_up_threshold: 42

      soft_torque_curriculum: False
      soft_torque_initial_limit: 1.15
      soft_torque_max_limit: 1.25
      soft_torque_min_limit: 0.85
      soft_torque_curriculum_degree: 0.00000025
      soft_torque_curriculum_level_down_threshold: 40
      soft_torque_curriculum_level_up_threshold: 42
  # WL3 직립 시 프레임에서 본 중력 벡터 (WL3는 z-up 프레임이 아님 — FK로 산출)
  torso_upright_local_gravity: [0.0, 1.0, 0.0]
  # 발목(LL6) 원점 z 기준. 직립 시 0.097 → 0.25는 약 15cm 스윙 리프트 (문제 3)
  feet_height_target: 0.18
  locomotion_max_contact_force: 350.0
  desired_feet_max_height_for_this_air: 0.2
  desired_base_height: 0.89

  reward_penalty_curriculum: True # for train stability - sybae
  reward_initial_penalty_scale : 0.8
  reward_min_penalty_scale: 0.2
  reward_max_penalty_scale: 1.0
  reward_penalty_level_down_threshold: 400
  reward_penalty_level_up_threshold: 900
  reward_penalty_degree: 0.00001
  num_compute_average_epl: 10000

  reward_penalty_reward_names : [
    "penalty_torques",
    "penalty_dof_acc",
    "penalty_dof_vel",
    "penalty_action_rate",
    "penalty_feet_contact_forces",
    "penalty_stumble",
    "penalty_slippage",
    "penalty_feet_ori",
    "penalty_in_the_air",
    "limits_dof_pos",
    "limits_dof_vel",
    "limits_torque",
    # "termination",
    "feet_max_height_for_this_air",
    "base_height",
    "penalty_feet_height",
    "penalty_hip_pos",
    "penalty_torso_ori",
    "penalty_stand_still",
    "penalty_lin_vel_z",
    "penalty_ang_vel_xy",]
